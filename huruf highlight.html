<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hover Image Effect</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">

    <style>
        /* --- RESET DASAR --- */
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        /* --- CONTAINER PARAGRAF --- */
        .content-box {
            max-width: 600px;
            background: #ffffff;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            line-height: 1.6; /* Jarak antar baris yang nyaman */
            font-size: 18px;
            color: #333;
        }

        /* --- INI KUNCI UTAMANYA --- */

        /* 1. KATA PEMICU (JANGKAR) */
        .hover-trigger {
            position: relative; /* Agar gambar patokannya ke kata ini */
            display: inline-block;
            font-weight: 700; /* Bold */
            cursor: pointer;
            color: #000;
            text-decoration: underline;
            text-decoration-thickness: 2px;
            text-decoration-color: #ccc;
            transition: color 0.2s;
        }

        .hover-trigger:hover {
            color: #000;
            text-decoration-color: #000;
        }

        /* 2. GAMBAR MELAYANG (TOOLTIP) */
        .hover-image {
            position: absolute;
            
            /* Posisi: Tempelkan bawah gambar ke atas teks */
            bottom: 100%; 
            left: 50%;
            
            /* Geser ke tengah & beri jarak (biar ga nempel teks) */
            transform: translate(-50%, 10px) scale(0.8); 
            
            /* Visual Gambar */
            width: 150px; /* Atur lebar gambar di sini */
            height: auto;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            border: 1px solid rgba(0,0,0,0.1);
            background: #fff;
            z-index: 10; /* Pastikan di layer paling atas */
            
            /* Animasi Masuk */
            opacity: 0;
            visibility: hidden;
            pointer-events: none; /* Mouse tembus pandang (biar ga ngehalangin) */
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* Efek membal */
        }

        /* 3. EFEK SAAT HOVER */
        .hover-trigger:hover .hover-image {
            opacity: 1;
            visibility: visible;
            /* Gambar naik ke atas sedikit & membesar */
            transform: translate(-50%, -15px) scale(1); 
        }

        /* Opsional: Segitiga Panah Kecil di Bawah Gambar */
        .hover-image::after {
            content: '';
            position: absolute;
            top: 100%; /* Di bawah gambar */
            left: 50%;
            margin-left: -6px;
            border-width: 6px;
            border-style: solid;
            border-color: #fff transparent transparent transparent; /* Panah warna putih */
        }

    </style>
</head>
<body>

    <div class="content-box">
        <p>
            I’m a Marketing student based in Bandung, Indonesia. On 
            
            <span class="hover-trigger">
                About
                <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?q=80&w=200&auto=format&fit=crop" class="hover-image" alt="My Portrait">
            </span>, 
            
            you'll find how I combine design and marketing strategy to create work that’s visually engaging and data driven. My 
            
            <span class="hover-trigger">
                Portfolio
                <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?q=80&w=200&auto=format&fit=crop" class="hover-image" alt="My Work">
            </span> 
            
            highlights projects focused on content creation and brand storytelling.
        </p>
    </div>

</body>
</html>
