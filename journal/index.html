        <script>
            document.addEventListener("DOMContentLoaded", () => {
                const footerPromise = fetch('../footer.html').then(response => response.text());
                const preloader = document.getElementById('preloader');
                
                let currentProgress = 0;
                const counter = document.getElementById('counter');
                const bar = document.getElementById('bar');
                const phraseEl = preloader ? preloader.querySelectorAll('.corner-text')[3] : null;
                const phrases = ["SYSTEM CHECK...", "PREPARING ASSETS...", "ALIGNING PIXELS...", "OPTIMIZING UI..."];

                function updateCounter() {
                    const jump = Math.floor(Math.random() * 45) + 25;
                    currentProgress += jump;
                    if (currentProgress > 100) currentProgress = 100;

                    if(counter) counter.innerText = currentProgress.toString().padStart(2, '0') + "%";
                    if(bar) bar.style.width = currentProgress + "%";

                    if(phraseEl) {
                        let pIndex = Math.floor((currentProgress / 100) * phrases.length);
                        if (pIndex >= phrases.length) pIndex = phrases.length - 1;
                        phraseEl.innerText = phrases[pIndex];
                    }

                    let delay = Math.floor(Math.random() * 150) + 20;

                    if (currentProgress < 100) {
                        setTimeout(updateCounter, delay);
                    } else {
                        const counterWrapper = document.querySelector('.counter-wrapper');
                        if (counterWrapper) counterWrapper.classList.add('fade-out');

                        const sfx = document.getElementById('completion-sound');
                        if (sfx) {
                            sfx.play().catch(e => console.log("Audio autoplay blocked:", e));
                        }

                        footerPromise.then((footerData) => {
                            const tempDiv = document.createElement('div');
                            tempDiv.innerHTML = footerData;
                            tempDiv.querySelectorAll('[data-w-id]').forEach(el => el.removeAttribute('data-w-id'));
                            
                            const footerContainer = document.getElementById('footer-container');
                            if (footerContainer) footerContainer.innerHTML = tempDiv.innerHTML;
                            
                            requestAnimationFrame(() => {
                                if (typeof window.initFooterGSAP === 'function') window.initFooterGSAP();
                                if (window.ScrollTrigger) ScrollTrigger.refresh();
                                setTimeout(finishLoading, 200);
                            });
                        }).catch(error => {
                            console.error("Error fetching content:", error);
                            finishLoading();
                        });
                    }
                }

                function finishLoading() {
                    if(preloader) {
                        preloader.classList.add('finished');
                    }
                    document.body.style.overflow = "auto";
                    if (window.lenis) window.lenis.start();
                    window.dispatchEvent(new CustomEvent('preloaderDone'));
                }

                document.body.classList.add('preloader-active');
                setTimeout(updateCounter, 500);
            });
        </script>
    </head>
    <body class="body-2">

            <audio id="click-sound" src="https://assets.mixkit.co/sfx/preview/mixkit-modern-technology-select-3124.mp3" preload="auto"></audio>
        </div>

        <!-- Scripts -->

        <style>
            /* Anti-Flicker Inline CSS */
            body.preloader-active { overflow: hidden; }
            #preloader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #000; color: #fff; z-index: 99999; display: flex; justify-content: center; align-items: center; flex-direction: column; transition: transform 1.6s cubic-bezier(0.19, 1, 0.22, 1); transform-origin: top; }
            #preloader.finished { transform: translateY(-100%); }
            .counter-wrapper { position: relative; text-align: center; transition: opacity 0.5s ease; }
            .counter-wrapper.fade-out { opacity: 0; }
            #counter { font-size: 15vw; font-weight: 700; letter-spacing: -0.04em; font-family: 'Inter', sans-serif; display: block; }
            .corner-text { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; opacity: 0.6; font-family: 'Inter', sans-serif; }
            .top-corners, .bottom-corners { position: absolute; width: calc(100% - 60px); left: 30px; right: 30px; display: flex; justify-content: space-between; }
            .top-corners { top: 30px; } .bottom-corners { bottom: 40px; }
            .progress-track { position: absolute; bottom: 0; left: 0; width: 100%; height: 6px; background: #1a1a1a; }
            .progress-fill { height: 100%; width: 0%; background: #ffffff; transition: width 0.2s ease; }
            @media (max-width: 768px) { #counter { font-size: 20vw; } .corner-text { font-size: 9px; } .top-corners, .bottom-corners { width: calc(100% - 40px); left: 20px; right: 20px; } .top-corners { top: 20px; } .bottom-corners { bottom: 25px; } }
        </style>
        <script>
            // Animation script specific for Journal Masonry
            window.addEventListener('preloaderDone', () => {
                if (typeof gsap === 'undefined') return;
                
                // Typing effect function
                function startTyping() {
                    const quoteEl = document.getElementById('jack-quote');
                    if (quoteEl && !quoteEl.classList.contains('is-typing')) {
                        quoteEl.classList.add('is-typing');
                        const text = '"Not all treasure is silver and gold, mate."';
                        quoteEl.innerHTML = ''; // Kosongkan teks awal
                        
                        let i = 0;
                        function typeWriter() {
                            if (i < text.length) {
                                quoteEl.innerHTML = text.substring(0, i + 1) + '<span style="font-weight: 300; font-style: normal; animation: mdkgBlink 0.8s step-end infinite;">|</span>';
                                i++;
                                let speed = Math.random() * 50 + 30; // Kecepatan acak natural
                                if (text.charAt(i - 1) === ',') speed += 250; // Jeda ekstra saat ada koma
                                setTimeout(typeWriter, speed);
                            } else {
                                setTimeout(() => { quoteEl.innerHTML = text; }, 2500); // Hilangkan kursor setelah berkedip sebentar
                            }
                        }
                        setTimeout(typeWriter, 400); // Delay tipis sebelum mulai ngetik
                    }
                }

                // Animate Hero
                gsap.to('.journal-hero-anim', {
                    opacity: 1,
                    y: 0,
                    duration: 1.2,
                    ease: "power3.out",
                    onStart: startTyping
                });
                
                // Stagger animate masonry items
                gsap.to('.journal-anim-item', {
                    opacity: 1,
                    y: 0,
                    duration: 0.8,
                    stagger: 0.1,
                    ease: "power3.out",
                    delay: 0.2
                });
            });
            
            // Fallback if preloader event fails to fire
            setTimeout(() => {
                if(document.querySelector('.journal-hero-anim').style.opacity == 0) {
                    gsap.to('.journal-hero-anim', { opacity: 1, y: 0, duration: 1 });
                    gsap.to('.journal-anim-item', { opacity: 1, y: 0, stagger: 0.1, duration: 1 });
                    startTyping();
                }
            }, 1500);
        </script>
