<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8"/>
        <title>Insights & Journal | MDKG Portfolio</title>
        <meta content="Thoughts, experiments, and visual strategies by Dimas (MDKG)." name="description"/>
        <meta content="Insights & Journal | MDKG Portfolio" property="og:title"/>
        <meta content="Thoughts, experiments, and visual strategies by Dimas (MDKG)." property="og:description"/>
        <meta property="og:type" content="website"/>
        <meta content="width=device-width, initial-scale=1" name="viewport"/>
        
        <link href="https://cdn.prod.website-files.com/6933c25a0996b0f96f5c2bc3/css/mdkg.webflow.shared.4d3ebba11.css" rel="stylesheet" type="text/css" crossorigin="anonymous"/>
        <link rel="stylesheet" href="../css/style.css">
        <link rel="stylesheet" href="../widget.css">
        
        <link href="https://fonts.googleapis.com" rel="preconnect"/>
        <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin="anonymous"/>
        <script src="https://ajax.googleapis.com/ajax/libs/webfont/1.6.26/webfont.js" type="text/javascript"></script>
        <script type="text/javascript">
            WebFont.load({ google: { families: ["Inter:100,200,300,regular,500,600,700,800,900"] } });
        </script>
        
        <script>
            document.addEventListener("DOMContentLoaded", () => {
                const footerPromise = fetch('../footer.html').then(response => response.text());
                const preloader = document.getElementById('preloader');
                
                let currentProgress = 0;
                const counter = document.getElementById('counter');
                const bar = document.getElementById('bar');

                function updateCounter() {
                    const jump = Math.floor(Math.random() * 45) + 25;
                    currentProgress += jump;
                    if (currentProgress > 100) currentProgress = 100;

                    if(counter) counter.innerText = currentProgress.toString().padStart(2, '0') + "%";
                    if(bar) bar.style.width = currentProgress + "%";

                    let delay = Math.floor(Math.random() * 150) + 20;

                    if (currentProgress < 100) {
                        setTimeout(updateCounter, delay);
                    } else {
                        const counterWrapper = document.querySelector('.counter-wrapper');
                        if (counterWrapper) counterWrapper.classList.add('fade-out');

                        const sfx = document.getElementById('completion-sound');
                        if (sfx) {
                            sfx.play().catch(e => console.log("Audio autoplay blocked:", e));
                        }

                        footerPromise.then((footerData) => {
                            const tempDiv = document.createElement('div');
                            tempDiv.innerHTML = footerData;
                            tempDiv.querySelectorAll('[data-w-id]').forEach(el => el.removeAttribute('data-w-id'));
                            
                            const footerContainer = document.getElementById('footer-container');
                            if (footerContainer) footerContainer.innerHTML = tempDiv.innerHTML;
                            
                            requestAnimationFrame(() => {
                                if (typeof window.initFooterGSAP === 'function') window.initFooterGSAP();
                                if (window.ScrollTrigger) ScrollTrigger.refresh();
                                setTimeout(finishLoading, 200);
                            });
                        }).catch(error => {
                            console.error("Error fetching content:", error);
                            finishLoading();
                        });
                    }
                }

                function finishLoading() {
                    if(preloader) {
                        preloader.classList.add('finished');
                    }
                    document.body.style.overflow = "auto";
                    if (window.lenis) window.lenis.start();
                    window.dispatchEvent(new CustomEvent('preloaderDone'));
                }

                document.body.classList.add('preloader-active');
                setTimeout(updateCounter, 500);
            });
        </script>
    </head>
    <body class="body-2">
        <div id="preloader">
            <div class="top-corners">
                <div class="corner-text">LOADING</div>
                <div class="corner-text">PLEASE WAIT</div>
            </div>
            <div class="counter-wrapper">
                <span id="counter">0%</span>
            </div>
            <div class="bottom-corners">
                <div class="corner-text">SYSTEM CHECK</div>
                <div class="corner-text">FETCHING INSIGHTS</div>
            </div>
            <div class="progress-track">
                <div class="progress-fill" id="bar"></div>
            </div>
            <audio id="completion-sound" src="https://assets.mixkit.co/sfx/preview/mixkit-software-interface-start-2574.mp3" preload="auto"></audio>
            <audio id="click-sound" src="https://assets.mixkit.co/sfx/preview/mixkit-modern-technology-select-3124.mp3" preload="auto"></audio>
        </div>
        
        <div class="body-wrapper">
            <div id="navbar-container"></div>
            
            <!-- Hero Section -->
            <section id="top" class="portfolio-hero-section section-margin">
                <div class="w-layout-blockcontainer global-wrapper w-container">
                    <div class="global-padding">
                        <div class="home-hero-wrapper">
                            <div class="home-hero-headline-wrapper page-portfolio journal-hero-anim" style="opacity: 0; transform: translateY(30px);">
                                <h1 class="home-hero-headline-text-2">Insights</h1>
                                <p class="subtitle">Thoughts on visual strategy, industry breakdowns, and my creative process.</p>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Masonry Grid Section -->
            <section class="section-margin">
                <div class="w-layout-blockcontainer global-wrapper w-container">
                    <div class="global-padding">
                        <div class="masonry-grid" id="journal-grid">
                            <!-- Kartu artikel akan di-inject otomatis oleh script.js -->
                        </div>
                    </div>
                </div>
            </section>

            <div id="footer-container"></div>
        </div>

        <!-- MDKG Widget Container -->
        <div id="mdkg-widget-container"></div>

        <!-- Scripts -->
        <script src="https://d3e54v103j8qbb.cloudfront.net/js/jquery-3.5.1.min.dc5e7f18c8.js?site=6933c25a0996b0f96f5c2bc3" type="text/javascript" crossorigin="anonymous"></script>
        <script src="https://unpkg.com/lenis@1.0.45/dist/lenis.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
        <script src="../script.js"></script>
        <script src="../custom.js"></script>
        <script src="../widget.js"></script>
        
        <script>
            // Animation script specific for Journal Masonry
            window.addEventListener('preloaderDone', () => {
                if (typeof gsap === 'undefined') return;
                
                // Animate Hero
                gsap.to('.journal-hero-anim', {
                    opacity: 1,
                    y: 0,
                    duration: 1.2,
                    ease: "power3.out"
                });
                
                // Stagger animate masonry items
                gsap.to('.journal-anim-item', {
                    opacity: 1,
                    y: 0,
                    duration: 0.8,
                    stagger: 0.1,
                    ease: "power3.out",
                    delay: 0.2
                });
            });
            
            // Fallback if preloader event fails to fire
            setTimeout(() => {
                if(document.querySelector('.journal-hero-anim').style.opacity == 0) {
                    gsap.to('.journal-hero-anim', { opacity: 1, y: 0, duration: 1 });
                    gsap.to('.journal-anim-item', { opacity: 1, y: 0, stagger: 0.1, duration: 1 });
                }
            }, 1500);
        </script>
    </body>
</html>
