<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vampstag Interactive Table</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/Draggable.min.js"></script>
    
    <style>
        body {
            margin: 0;
            background-color: #eef2f5; 
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Area Meja */
        .table-surface {
            position: relative;
            width: 100%;
            height: 100%;
            perspective: 1000px;
            display: flex; justify-content: center; align-items: center;
        }

        .card {
            position: absolute;
            width: 280px;  /* Ukuran Kartu */
            height: 400px;
            border-radius: 20px;
            background-color: #fff;
            
            /* Shadow awal */
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            
            cursor: grab;
            overflow: hidden; 
            border: 1px solid rgba(0,0,0,0.05);
            
            will-change: transform; 
            transform-origin: center center;
            touch-action: none;
        }

        .card:active { cursor: grabbing; box-shadow: 0 20px 40px rgba(0,0,0,0.2); transform: scale(1.02); }

        .card-img {
            width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0; transition: opacity 0.5s ease;
            pointer-events: none; display: block;
        }
        .card-img.loaded { opacity: 1; }

        /* Loading State */
        .card.is-loading { background: #e0e0e0; }
        .card.is-loading::after {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            transform: translateX(-100%);
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            animation: shimmer 1.2s infinite;
        }
        @keyframes shimmer { 100% { transform: translateX(100%); } }

        /* --- CONTROLS --- */
        .controls {
            position: absolute; bottom: 40px;
            display: flex; gap: 15px;
            z-index: 9999;
        }

        .btn {
            padding: 12px 24px;
            border: none; background: #000; color: #fff;
            border-radius: 50px; cursor: pointer;
            font-weight: 600; font-size: 14px; letter-spacing: 1px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            transition: transform 0.1s, background 0.2s;
        }
        .btn:hover { background: #333; transform: translateY(-2px); }
        .btn:active { transform: translateY(0); }
        .btn-outline { background: #fff; color: #000; border: 1px solid #ccc; }
        .btn-outline:hover { background: #f0f0f0; }

    </style>
</head>
<body>

    <div class="table-surface" id="table">
        </div>

    <div class="controls">
        <button class="btn btn-outline" onclick="scatterCards()">CHAOS (SCATTER)</button>
        <button class="btn" onclick="organizeCards()">ORDER (REARRANGE)</button>
    </div>

    <script>
        gsap.registerPlugin(Draggable);

        // DATA GAMBAR
        const IMAGES = [
            'https://images.unsplash.com/photo-1542291026-7eec264c27ff?q=80&w=600',
            'https://images.unsplash.com/photo-1600185365926-3a2ce3cdb9eb?q=80&w=600',
            'https://images.unsplash.com/photo-1549298916-b41d501d3772?q=80&w=600',
            'https://images.unsplash.com/photo-1595950653106-6c9ebd614d3a?q=80&w=600',
            'https://images.unsplash.com/photo-1606107557195-0e29a4b5b4aa?q=80&w=600',
            'https://images.unsplash.com/photo-1608231387042-66d1773070a5?q=80&w=600',
            'https://images.unsplash.com/photo-1560769629-975e13f0c470?q=80&w=600',
            'https://images.unsplash.com/photo-1512374382149-233c42b6a83b?q=80&w=600'
        ];

        const CONTAINER = document.getElementById('table');
        let cardElements = []; 
        let globalZIndex = 100; // Counter buat Z-Index

        // --- INIT ---
        function init() {
            // Buat semua kartu sekaligus
            IMAGES.forEach((url, i) => {
                createCard(url, i);
            });
            
            // Susun rapi di awal
            organizeCards(0); 
        }

        // --- CREATE CARD ---
        function createCard(url, index) {
            const el = document.createElement('div');
            el.classList.add('card', 'is-loading');

            const img = document.createElement('img');
            img.classList.add('card-img');
            img.src = url;
            img.onload = () => {
                el.classList.remove('is-loading');
                img.classList.add('loaded');
            };

            el.appendChild(img);
            CONTAINER.appendChild(el);
            cardElements.push(el);

            // SETUP DRAGGABLE (Untuk SETIAP kartu)
            Draggable.create(el, {
                type: "x,y",
                edgeResistance: 0.65,
                bounds: window,
                inertia: true,
                onPress: function() {
                    // Saat ditekan, bawa kartu ke paling atas
                    bringToFront(this.target);
                    // Animasi 'angkat' sedikit
                    gsap.to(this.target, { scale: 1.05, duration: 0.2, boxShadow: "0 20px 40px rgba(0,0,0,0.3)" });
                },
                onRelease: function() {
                    // Animasi 'taruh' kembali
                    gsap.to(this.target, { scale: 1, duration: 0.2, boxShadow: "0 5px 15px rgba(0,0,0,0.1)" });
                },
                onDrag: function() {
                    // Miringkan sedikit sesuai arah drag
                    gsap.to(this.target, { rotation: this.x * 0.05, duration: 0.1 });
                }
            });
        }

        // --- HELPER: Z-INDEX ---
        function bringToFront(element) {
            globalZIndex++;
            element.style.zIndex = globalZIndex;
        }

        // --- FEATURE 1: ORGANIZE (REARRANGE) ---
        function organizeCards(duration = 0.8) {
            // Reset Z-Index counter biar rapi lagi (opsional)
            globalZIndex = 100;

            cardElements.forEach((card, i) => {
                // Atur ulang tumpukan
                card.style.zIndex = i + 1; 

                // Hitung posisi tumpukan rapi (sedikit offset biar terlihat tebal)
                // Kita buat sedikit acak rotasinya biar natural (-3 sampai 3 derajat)
                const randomRot = (Math.random() * 6) - 3; 

                gsap.to(card, {
                    x: 0, // Kembali ke tengah container
                    y: i * -2, // Offset vertikal tipis (efek tumpukan)
                    rotation: randomRot,
                    scale: 1,
                    duration: duration,
                    ease: "elastic.out(1, 0.7)", // Efek membal saat menyatu
                    overwrite: "auto" // Hentikan animasi lain/drag yang sedang jalan
                });
            });
        }

        // --- FEATURE 2: SCATTER (CHAOS) ---
        function scatterCards() {
            cardElements.forEach((card) => {
                // Bawa ke depan saat mulai terbang biar ga clipping aneh
                bringToFront(card);

                // Hitung posisi acak dalam layar
                // window.innerWidth / 2.5 biar ga terlalu pinggir
                const rangeX = window.innerWidth / 2.5; 
                const rangeY = window.innerHeight / 2.5;

                const randomX = (Math.random() * rangeX * 2) - rangeX;
                const randomY = (Math.random() * rangeY * 2) - rangeY;
                const randomRot = (Math.random() * 90) - 45; // Rotasi acak ekstrim

                gsap.to(card, {
                    x: randomX,
                    y: randomY,
                    rotation: randomRot,
                    scale: 1,
                    duration: 0.6 + Math.random() * 0.4, // Durasi variatif
                    ease: "power2.out"
                });
            });
        }

        // START
        init();

    </script>
</body>
</html>
